name = "mindhorizon-bot"
main = "worker.js"
compatibility_date = "2026-07-01"

# KV для ожидающих подтверждения разборов (создать: wrangler kv namespace create PENDING)
[[kv_namespaces]]
binding = "PENDING"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
GITHUB_REPO = "adotka/exploreapp"
SITE_URL = "https://adotka.github.io/exploreapp"
MODEL = "claude-opus-4-8"          # дешевле: "claude-haiku-4-5" (хуже читает сложные сканы)
OPERATOR_CHAT_ID = "REPLACE_WITH_YOUR_TELEGRAM_USER_ID"

# Секреты — НЕ сюда, а через `wrangler secret put <NAME>`:
#   TELEGRAM_BOT_TOKEN      — credential, do not expose (хранится в Cloudflare)
#   TELEGRAM_WEBHOOK_SECRET — credential, do not expose
#   ANTHROPIC_API_KEY       — credential, do not expose
#   GITHUB_TOKEN            — credential, do not expose (fine-grained PAT, contents RW)
